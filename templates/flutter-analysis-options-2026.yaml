# Flutter analysis_options.yaml — 2026 strict configuration
# Copy to project root as `analysis_options.yaml`.
#
# Requires in pubspec.yaml dev_dependencies:
#   very_good_analysis: ^9.0.0
#   custom_lint: ^0.7.5
#   riverpod_lint: ^2.6.3
#   flutter_a11y_lints: ^0.3.0
#
# Key choices:
#   strict-casts / strict-inference / strict-raw-types: true   — zero implicit unsafety
#   unawaited_futures: error                                    — fire-and-forget async is a bug
#   custom_lint enabled                                         — Riverpod + a11y lint plugins

include: package:very_good_analysis/analysis_options.yaml

analyzer:
  # ── Strict type checking (3 pillars) ─────────────────────────────────────
  language:
    strict-casts: true        # No implicit Object→T downcasts
    strict-inference: true    # No unresolved generic inference
    strict-raw-types: true    # No raw List/Map/dynamic without type args

  # ── Exclude generated files ───────────────────────────────────────────────
  exclude:
    - "**/*.g.dart"           # json_serializable, Riverpod codegen
    - "**/*.freezed.dart"     # freezed
    - "**/*.drift.dart"       # drift (SQLite ORM)
    - "**/*.config.dart"      # build runner config outputs
    - "**/generated/**"
    - "lib/generated/**"
    - "test/.test_coverage.dart"

  # ── Plugin activation ─────────────────────────────────────────────────────
  plugins:
    - custom_lint             # Activates riverpod_lint + flutter_a11y_lints

  # ── Severity overrides ────────────────────────────────────────────────────
  errors:
    # Treat fire-and-forget async as a compile error, not a hint
    unawaited_futures: error

    # RTL/DirectionalWidget violations — always errors
    # (These come from flutter_a11y_lints / custom_lint rules)
    avoid_non_directional_padding: error
    avoid_non_directional_alignment: error

    # Null safety
    null_check_on_nullable_type_parameter: error
    unnecessary_null_comparison: error

    # Dead code / unused
    dead_code: warning
    unused_import: error
    unused_local_variable: error
    unused_field: warning

    # Deprecated API usage
    deprecated_member_use_from_same_package: error
    deprecated_member_use: warning

linter:
  rules:
    # ── Safety ───────────────────────────────────────────────────────────────
    unawaited_futures: true           # Async fire-and-forget = bug (CRITICAL — see past-mistakes.md)
    avoid_void_async: true            # Async functions returning void hide errors
    cancel_subscriptions: true        # StreamSubscription.cancel() in dispose()
    close_sinks: true                 # IOSink.close() in dispose()
    avoid_dynamic_calls: true         # No .call() on dynamic
    avoid_type_to_string: true        # Type.toString() in prod code = debug artifact
    no_runtimeType_toString: true     # Same as above, runtimeType variant

    # ── Type Safety ──────────────────────────────────────────────────────────
    avoid_annotating_with_dynamic: true
    unnecessary_cast: true
    unnecessary_type_check: true

    # ── Null Safety ──────────────────────────────────────────────────────────
    cast_nullable_to_non_nullable: true
    null_closures: true
    prefer_null_aware_method_calls: true
    use_if_null_to_convert_nulls_to_bools: true

    # ── Code Quality ─────────────────────────────────────────────────────────
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_fields: true
    prefer_final_locals: true
    prefer_final_parameters: true
    prefer_expression_function_bodies: true
    avoid_redundant_argument_values: true
    avoid_multiple_declarations_per_line: true
    require_trailing_commas: true     # Enforces consistent formatting for dart format

    # ── Error Handling ────────────────────────────────────────────────────────
    only_throw_errors: true           # throw only extends Error/Exception
    use_rethrow_when_possible: true   # rethrow instead of throw caught exception
    avoid_catching_errors: true       # Catch Exception, not Error

    # ── Async / Concurrency ──────────────────────────────────────────────────
    avoid_void_async: true
    discarded_futures: true

    # ── Flutter-Specific ──────────────────────────────────────────────────────
    use_key_in_widget_constructors: true      # Widgets need Key for element tree
    avoid_unnecessary_containers: true        # No bare Container wrappers
    sized_box_for_whitespace: true            # SizedBox over Container for spacing
    sized_box_shrink_expand: true
    use_full_hex_values_for_flutter_colors: true  # 0xFF000000 not 0x000000
    use_colored_box: true                     # ColoredBox over Container(color:)
    avoid_web_libraries_in_flutter: true      # No dart:html in Flutter apps

    # ── Performance ───────────────────────────────────────────────────────────
    avoid_slow_async_io: true         # No File.exists() sync in hot paths

    # ── Documentation ─────────────────────────────────────────────────────────
    public_member_api_docs: false     # Enable for libraries; too noisy for apps
    comment_references: true

    # ── Disabled (noisy / conflict with very_good_analysis) ──────────────────
    lines_longer_than_80_chars: false  # very_good_analysis handles line length
    one_member_abstracts: false        # Useful for Riverpod Notifier patterns
