name: Mutation Testing

on:
  schedule:
    - cron: '23 3 * * 0'  # Sunday 3:23 AM (off-minute per CLAUDE.md)
  pull_request:
    paths:
      - 'src/lib/**'
      - 'src/hooks/**'
      - 'src/services/**'
      - 'src/utils/**'
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  mutation:
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4

      - name: Add Node.js (fnm) to PATH
        run: echo "$HOME/.local/share/fnm/node-versions/v24.14.0/installation/bin" >> $GITHUB_PATH

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Stryker cache
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ github.ref_name }}-
            stryker-main-
            stryker-master-

      - name: Run mutation testing (incremental)
        run: npx stryker run --incremental
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Report mutation score via GitHub Issue
        if: always()
        run: |
          # Extract mutation score from Stryker report
          SCORE="unknown"
          if [ -f reports/mutation/mutation.json ]; then
            SCORE=$(python3 -c "
          import json
          try:
            d = json.load(open('reports/mutation/mutation.json'))
            killed = d.get('killed', 0)
            total = d.get('total', 0)
            if total > 0:
              print(f'{round(killed/total*100, 1)}')
            else:
              print('N/A')
          except Exception:
            print('N/A')
          " 2>/dev/null || echo "N/A")
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="$(printf '## Mutation Testing Results\n\n**Mutation Score:** %s%%\n\n**Branch:** \`%s\`  \n**Run:** [View full report](%s)\n\n### Interpretation\n- >80%% = excellent test suite\n- 60-80%% = acceptable, consider adding targeted tests\n- <60%% = tests need strengthening\n\n*Auto-created by Mutation Testing workflow.*' "$SCORE" "${{ github.ref_name }}" "$RUN_URL")"

          gh issue create \
            --title "🧬 Mutation Testing: score ${SCORE}% on \`${{ github.ref_name }}\`" \
            --body "$BODY" \
            --label "quality" \
            2>/dev/null || \
          gh issue create \
            --title "🧬 Mutation Testing: score ${SCORE}% on \`${{ github.ref_name }}\`" \
            --body "$BODY" \
            2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🧬 Mutation Testing FAILED | ${{ github.repository }} | ${{ github.ref_name }}" \
            > /dev/null 2>&1 || true
