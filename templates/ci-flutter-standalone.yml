name: CI — Flutter
# Standalone Flutter CI template (not reusable workflow_call).
# Copy to project .github/workflows/ and customize as needed.
#
# REQUIRED — fill in before copying:
#   MAIN_BRANCH:      main          # main | master
#   FLUTTER_VERSION:  3.x           # or pin to specific version
#   JAVA_VERSION:     17

on:
  push:
    branches: [main]                # PLACEHOLDER: MAIN_BRANCH
  pull_request:
    branches: [main]                # PLACEHOLDER: MAIN_BRANCH

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          cache: true
      - run: flutter pub get
      - run: flutter analyze --fatal-infos
      - run: dart format --set-exit-if-changed .

  test:
    name: Flutter Test (very_good)
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          cache: true
      - run: flutter pub get
      # very_good_cli: fail-fast + coverage enforcement (replaces `flutter test`)
      - run: dart pub global activate very_good_cli
      - run: dart pub global run very_good_cli:very_good test --coverage --fail-fast
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/lcov.info
          retention-days: 7

  # ── SECURITY LAYER ────────────────────────────────────────────────────────
  trivy:
    name: Trivy (CVE + Secrets)
    permissions:
      contents: read
      security-events: write
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Trivy — CRITICAL findings block merge
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 SHA-pinned
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Trivy — HIGH findings (warning only)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 SHA-pinned
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
  # ─────────────────────────────────────────────────────────────────────────

  ci-gate:
    name: CI Gate
    runs-on: [self-hosted, linux, x64, pop-os]
    if: always()
    needs: [analyze, test, trivy, gitleaks]
    steps:
      - uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: audit
      - run: |
          FAILED=0
          [ "${{ needs.analyze.result }}"  != "success" ] && FAILED=1 && echo "❌ analyze"
          [ "${{ needs.test.result }}"     != "success" ] && FAILED=1 && echo "❌ test"
          [ "${{ needs.trivy.result }}"    != "success" ] && FAILED=1 && echo "❌ trivy (CRITICAL CVE found)"
          [ "${{ needs.gitleaks.result }}" != "success" ] && FAILED=1 && echo "❌ gitleaks (secret leaked)"
          [ $FAILED -eq 0 ] && echo "✅ Flutter CI passed" && exit 0
          echo "❌ Flutter CI failed" && exit 1
      - name: Notify Telegram on failure
        if: failure()
        run: |
          MSG="🚨 *${{ github.repository }} Flutter CI FAILED*%0ABranch: \`${{ github.ref_name }}\`%0ABy: ${{ github.actor }}%0A🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=$MSG" -d "parse_mode=Markdown" > /dev/null 2>&1 || true
      - name: Notify Telegram on success
        if: success()
        run: |
          MSG="✅ *${{ github.repository }} Flutter CI PASSED*%0ABranch: \`${{ github.ref_name }}\`%0ABy: ${{ github.actor }}"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=$MSG" -d "parse_mode=Markdown" > /dev/null 2>&1 || true
