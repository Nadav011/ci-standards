name: CI + Deploy — Vite/React (Reusable)
# Called from any Vite+React project with:
#   uses: Nadav011/ci-standards/.github/workflows/ci-vite-react.yml@main
#   secrets: inherit

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      test-shards:
        type: number
        default: 4
      coverage-threshold:
        type: number
        default: 65
    secrets:
      VERCEL_TOKEN:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false
      LHCI_GITHUB_APP_TOKEN:
        required: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - uses: actions/cache/save@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  typecheck:
    name: TypeCheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - uses: actions/cache@v4
        with:
          path: .tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig*.json', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: tsbuildinfo-${{ runner.os }}-
      - run: npm run typecheck

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run lint

  # ── SECURITY LAYER ────────────────────────────────────────────────────────
  # trivy: CVEs in deps + hardcoded secrets. CRITICAL = blocks merge.
  trivy:
    name: Trivy (CVE + Secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trivy — CRITICAL findings block merge
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Trivy — HIGH findings (warning only)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true

  # semgrep: OWASP Top 10, XSS, SQL injection, React patterns.
  # Runs as warning — review findings in GitHub Security tab.
  # Tighten exit-code to "1" once existing findings are resolved.
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # sbom: Software Bill of Materials + npm audit
  sbom:
    name: SBOM + Audit
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm audit --audit-level=critical
        continue-on-error: true
      - run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format JSON
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.json
          retention-days: 30
  # ─────────────────────────────────────────────────────────────────────────

  unit-test:
    name: Tests (shard ${{ matrix.shard }}/${{ inputs.test-shards }})
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx vitest run --project unit --shard=${{ matrix.shard }}/${{ inputs.test-shards }}

  build:
    name: Build
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Pull Vercel env (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > .vercel/project.json
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true
      - run: npm run build
        env: { NODE_ENV: production }
      - uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 3

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [typecheck, lint, unit-test, trivy, gitleaks, build]
    steps:
      - run: |
          FAILED=0
          [ "${{ needs.typecheck.result }}"  != "success" ] && FAILED=1 && echo "❌ typecheck"
          [ "${{ needs.lint.result }}"       != "success" ] && FAILED=1 && echo "❌ lint"
          [ "${{ needs.unit-test.result }}"  != "success" ] && FAILED=1 && echo "❌ unit-test"
          [ "${{ needs.trivy.result }}"      != "success" ] && FAILED=1 && echo "❌ trivy (CRITICAL CVE found)"
          [ "${{ needs.gitleaks.result }}"   != "success" ] && FAILED=1 && echo "❌ gitleaks (secret leaked)"
          [ "${{ needs.build.result }}"      != "success" ] && FAILED=1 && echo "❌ build"
          [ $FAILED -eq 0 ] && echo "✅ All checks passed" && exit 0
          echo "❌ CI failed" && exit 1

  deploy:
    name: Deploy to Vercel
    needs: [ci-gate]
    if: |
      needs.ci-gate.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-dist, path: dist/ }
      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > .vercel/project.json
          printf '{"version":3,"routes":[{"src":"^/assets/(.*)$","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},{"handle":"filesystem"},{"src":"(.*)","dest":"/index.html"}]}' > .vercel/output/config.json
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      - run: npx vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── POST-DEPLOY: Lighthouse CI (main only, informational) ────────────────
  lhci:
    name: Lighthouse CI
    needs: [deploy]
    if: |
      needs.deploy.result == 'success' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - uses: actions/download-artifact@v4
        with: { name: build-dist, path: dist/ }
      - run: npx @lhci/cli@0.15.1 autorun
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
