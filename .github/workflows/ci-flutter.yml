name: CI — Flutter (Reusable)
# Called from any Flutter project with:
#   uses: Nadav011/ci-standards/.github/workflows/ci-flutter.yml@main

on:
  workflow_call:
    inputs:
      flutter-version:
        type: string
        default: "3.x"
      java-version:
        type: string
        default: "17"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "${{ inputs.java-version }}" }
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze --fatal-infos
      - run: dart format --set-exit-if-changed .

  test:
    name: Flutter Test (very_good)
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "${{ inputs.java-version }}" }
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          cache: true
      - run: flutter pub get
      # very_good_cli: fail-fast + coverage enforcement (replaces `flutter test`)
      - run: dart pub global activate very_good_cli
      - run: dart pub global run very_good_cli:very_good test --coverage --fail-fast
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/lcov.info
          retention-days: 7

  # ── SECURITY LAYER ────────────────────────────────────────────────────────
  # trivy: CVEs in Dart/pub deps + hardcoded secrets. CRITICAL = blocks merge.
  trivy:
    name: Trivy (CVE + Secrets)
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trivy — CRITICAL findings block merge
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Trivy — HIGH findings (warning only)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: [self-hosted, linux, x64, pop-os]
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
  # ─────────────────────────────────────────────────────────────────────────

  ci-gate:
    name: CI Gate
    runs-on: [self-hosted, linux, x64, pop-os]
    if: always()
    needs: [analyze, test, trivy, gitleaks]
    steps:
      - run: |
          FAILED=0
          [ "${{ needs.analyze.result }}"  != "success" ] && FAILED=1 && echo "❌ analyze"
          [ "${{ needs.test.result }}"     != "success" ] && FAILED=1 && echo "❌ test"
          [ "${{ needs.trivy.result }}"    != "success" ] && FAILED=1 && echo "❌ trivy (CRITICAL CVE found)"
          [ "${{ needs.gitleaks.result }}" != "success" ] && FAILED=1 && echo "❌ gitleaks (secret leaked)"
          [ $FAILED -eq 0 ] && echo "✅ Flutter CI passed" && exit 0
          echo "❌ Flutter CI failed" && exit 1
