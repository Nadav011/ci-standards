name: CI — Flutter (Reusable)
# Called from any Flutter project with:
#   uses: Nadav011/ci-standards/.github/workflows/ci-flutter.yml@main

on:
  workflow_call:
    inputs:
      flutter-version:
        type: string
        default: "3.x"
      java-version:
        type: string
        default: "17"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "${{ inputs.java-version }}" }
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze --fatal-infos
      - run: dart format --set-exit-if-changed .

  test:
    name: Flutter Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "${{ inputs.java-version }}" }
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          cache: true
      - run: flutter pub get
      - run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/lcov.info
          retention-days: 7

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [analyze, test, gitleaks]
    steps:
      - run: |
          FAILED=0
          [ "${{ needs.analyze.result }}"  != "success" ] && FAILED=1
          [ "${{ needs.test.result }}"     != "success" ] && FAILED=1
          [ "${{ needs.gitleaks.result }}" != "success" ] && FAILED=1
          [ $FAILED -eq 0 ] && echo "✅ Flutter CI passed" && exit 0
          echo "❌ Flutter CI failed" && exit 1
