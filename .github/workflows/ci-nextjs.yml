name: CI + Deploy — Next.js (Reusable)
# Called from any Next.js project with:
#   uses: Nadav011/ci-standards/.github/workflows/ci-nextjs.yml@main
#   secrets: inherit

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      package-manager:
        type: string
        default: "pnpm"  # pnpm | npm
    secrets:
      VERCEL_TOKEN:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: corepack enable && pnpm install --frozen-lockfile
      - name: Install (npm)
        if: inputs.package-manager == 'npm'
        run: npm ci
      - uses: actions/cache/save@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('*lock*') }}

  typecheck:
    name: TypeCheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('*lock*') }}
      - run: ${{ inputs.package-manager }} run typecheck

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('*lock*') }}
      - run: ${{ inputs.package-manager }} run lint

  security:
    name: Security + SBOM
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('*lock*') }}
      - run: ${{ inputs.package-manager == 'pnpm' && 'pnpm audit --audit-level=high' || 'npm audit --audit-level=high' }}
      - run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format JSON
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: sbom, path: sbom.json, retention-days: 30 }

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('*lock*') }}
      - run: ${{ inputs.package-manager }} run build
        env: { NODE_ENV: production }
      - uses: actions/upload-artifact@v4
        with: { name: build-out, path: .next/, retention-days: 3 }

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [typecheck, lint, security, gitleaks, build]
    steps:
      - run: |
          FAILED=0
          [ "${{ needs.typecheck.result }}" != "success" ] && FAILED=1
          [ "${{ needs.lint.result }}"      != "success" ] && FAILED=1
          [ "${{ needs.security.result }}"  != "success" ] && FAILED=1
          [ "${{ needs.gitleaks.result }}"  != "success" ] && FAILED=1
          [ "${{ needs.build.result }}"     != "success" ] && FAILED=1
          [ $FAILED -eq 0 ] && echo "✅ All checks passed" && exit 0
          echo "❌ CI failed" && exit 1

  deploy:
    name: Deploy to Vercel
    needs: [ci-gate]
    if: |
      needs.ci-gate.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ inputs.node-version }}" }
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('*lock*') }}
      - uses: actions/download-artifact@v4
        with: { name: build-out, path: .next/ }
      - run: npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
